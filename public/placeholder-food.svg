<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background with warm gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F5EFE6" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />
  
  <!-- Subtle Serving Platter Cloche illustration -->
  <g fill="none" stroke="#D0C9BC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(130, 90)">
    <!-- Cloche Handle -->
    <path d="M 60 20 A 10 10 0 1 1 80 20" />
    <!-- Cloche Dome -->
    <path d="M 10 70 A 60 60 0 0 1 130 70 Z" fill="#EAE3D2" fill-opacity="0.3" />
    <!-- Platter Base -->
    <path d="M 0 70 L 140 70" stroke-width="6" />
    <path d="M 10 76 Q 70 90 130 76" stroke-width="4" />
    <!-- Steam lines -->
    <path d="M 50 0 Q 55 -10 50 -20" stroke-width="3" stroke-dasharray="2 4" />
    <path d="M 70 -5 Q 75 -15 70 -25" stroke-width="3" stroke-dasharray="2 4" />
    <path d="M 90 0 Q 95 -10 90 -20" stroke-width="3" stroke-dasharray="2 4" />
  </g>
</svg>
